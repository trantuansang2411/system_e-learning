syntax = "proto3"; 

package user;

service UserService {
  rpc GetUserProfile (GetUserProfileRequest) returns (GetUserProfileResponse);
  rpc UpdateInstructorStatus (UpdateInstructorStatusRequest) returns (UpdateInstructorStatusResponse);
  rpc ReviewApplication (ReviewApplicationRequest) returns (ReviewApplicationResponse);
  rpc ListApplications (ListApplicationsRequest) returns (ListApplicationsResponse);
  rpc GetApplication (GetApplicationRequest) returns (ApplicationDetail);
}

message GetUserProfileRequest {
  string user_id = 1;
}

message GetUserProfileResponse {
  string user_id = 1;
  string full_name = 2;
  string avatar_url = 3;
  string email = 4;
  string bio = 5;
}

message UpdateInstructorStatusRequest {
  string user_id = 1;
  string status = 2;   // ACTIVE | BANNED
}

message UpdateInstructorStatusResponse {
  bool success = 1;
  string message = 2;
}

message ReviewApplicationRequest {
  string application_id = 1;
  string status = 2;   // APPROVED | REJECTED
  string reviewer_id = 3;
}

message ReviewApplicationResponse {
  bool success = 1;
  string message = 2;
  string user_id = 3;
}

message GetApplicationRequest {
  string application_id = 1;
}

message ListApplicationsRequest {
  string status = 1;   // PENDING
  int32 page = 2;
  int32 limit = 3;
}

message ApplicationItem {
  string user_id = 1;
  string status = 2;
  string full_name = 3;
  string headline = 4;
  string created_at = 5;
  string avatar_url = 6;
}

message ApplicationData {
  string full_name = 1;
  string birth_date = 2;
  string headline = 3;
  string experience = 4;
  repeated string expertise = 5;
  string education_level = 6;
  repeated string teaching_topics = 7;
  string portfolio_url = 8;
  string email = 10;
  string profile_image_url = 11;
}

message ApplicationDetail {
  string user_id = 1;
  ApplicationData data = 2;
  string status = 3;
  string reviewer_id = 4;
  string reviewed_at = 5;
  string created_at = 6;
  string updated_at = 7;
  string avatar_url = 8;
}

message ListApplicationsResponse {
  repeated ApplicationItem applications = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

