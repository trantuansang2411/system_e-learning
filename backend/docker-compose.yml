      retries: 3

  admin-service:
    build:
      context: .
      dockerfile: admin-service/Dockerfile
    ports:
      - "${ADMIN_SERVICE_PORT:-3012}:3012"
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3012/health', r => r.statusCode === 200 ? process.exit(0) : process.exit(1))" ]
      interval: 15s
      timeout: 5s
      retries: 3

  analytic-service:
    build:
      context: ./analytic-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/analytics_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: user-behavior-events
      KAFKA_GROUP_ID: analytic-service-group
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  rabbitmq_data:
  kafka_data:


networks:
  app-network:
    driver: bridge
