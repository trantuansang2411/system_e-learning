  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-3011}:3011"
    env_file: .env
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
